name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-build-test:
    runs-on: macos-15-arm64 # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
    strategy:
      fail-fast: false
      matrix:
        test_destination:
          - ios_version: "18.5"
            device: "iPhone 16 Pro"
          - ios_version: "26.1"
            device: "iPhone 17 Pro"
    env:
      SCHEME_NAME: "WrapKit"

    steps:
      # -----------------------------
      # Checkout Code
      # -----------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # Select Xcode
      # -----------------------------
      - name: Select Xcode 26.1.1
        run: |
          sudo xcode-select -s /Applications/Xcode_26.1.1.app
          xcodebuild -version

      # -----------------------------
      # Install Tools
      # -----------------------------
      - name: Install Tools
        run: |
          brew install sourcery
          brew install tuist
          brew install swiftgen
          brew install swiftlint
      # -----------------------------
      # Generate / Build
      # -----------------------------
      - name: Run Makefile for Build
        run: make project

      # -----------------------------
      # Ensure iOS Simulators
      # -----------------------------
      - name: List Available Simulators / Devices
        run: |
          echo "=== Devices ==="
          xcrun simctl list devices
      # -----------------------------
      # Run Tests
      # List of available OS versions in docs https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
      # -----------------------------
      - name: Run Tests on iOS ${{ matrix.test_destination.ios_version }}
        run: |
          xcodebuild clean build test \
            -workspace $SCHEME_NAME.xcworkspace \
            -scheme $SCHEME_NAME \
            -destination "platform=iOS Simulator,name=${{ matrix.test_destination.device }},OS=${{ matrix.test_destination.ios_version }}"

      # -----------------------------
      # Upload Snapshot Artifacts
      # -----------------------------
      - name: Upload Snapshot Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-test-failures-ios-${{ matrix.test_destination.ios_version }}
          path: /tmp/*/
          if-no-files-found: ignore
          retention-days: 10
          
